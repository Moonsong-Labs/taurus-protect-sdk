syntax = "proto3";

package tgvalidatord;

import "protoc-gen-openapiv2/options/annotations.proto";

option java_package = "com.taurushq.sdk.protect.proto.v1";

message Credentials {
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
        json_schema: {
            required: ["password"]
        }
    };

    string email = 1 [deprecated = true]; // Use username instead
    string password = 2;

    string totp = 3 [
        (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
            description: "Time-based One Time Password (2FA)";
        }
    ];

    string username = 4;
}

message SAMLAuthRequest {
    string index = 1;
    string signedTrackedRequest = 2;
    string location = 3;
}

message SAMLAuthRedirect {
    string token = 1;
    string location = 2;
}

message SAMLSession {
    string token = 1;
}

message OIDCLocation {
    string location = 1;
    string state = 2;
    string nonce = 3;
}

message OIDCSession {
    string token = 1;
}
